_target_: behavior_prompting.train_network.policy.diffusion_transformer_policy.DiffusionTransformerPolicy
name: diffusion_transformer_base

shape_meta: ${shape_meta}

n_emb: 768

noise_scheduler:
  _target_: diffusers.DDIMScheduler
  num_train_timesteps: 50
  beta_start: 0.0001
  beta_end: 0.02
  # beta_schedule is important
  # this is the best we found
  beta_schedule: squaredcos_cap_v2
  clip_sample: True
  set_alpha_to_one: True
  steps_offset: 0
  prediction_type: epsilon # or sample

num_inference_steps: 16
input_pertub: 0.1 # reference: https://github.com/forever208/DDPM-IP
diffusion_decoder_n_layer: 7
diffusion_decoder_n_head: 8
diffusion_encoder_enabled: False
diffusion_encoder_n_layer: 4
diffusion_encoder_n_head: 8
p_drop_attn: 0.1
