# fits in 24gb

defaults:
  - draw_policy_base
  - model: diffusion_unet
  - _self_

dataloader:
  batch_size: 48
  num_workers: 8
  persistent_workers: true
  pin_memory: true
  shuffle: true

val_dataloader:
  batch_size: 48
  num_workers: 8
  persistent_workers: false
  pin_memory: true
  shuffle: false

optimizer:
  lr: 2.5e-5
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

checkpoint:
  save_train_loss_ckpt_every: 5

training:
  gradient_accumulate_every: 1
  lr_scheduler: cosine
  lr_warmup_proportion: 0.05
  num_epochs: 40
  rollout_every: 5
  sample_every: 5
  use_ema: true
  freeze_encoder: False
  val_every: 5
  mixed_precision: 'no'
  clip_grad_norm: 1.5
